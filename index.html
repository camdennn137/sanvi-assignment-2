        <title>This is my assignment 2 website</title>
         <script src="https://cdnjs.cloudflare.com/ajax/libs/buzz/1.2.1/buzz.min.js"></script>
        


<html>
<head>
  <title>This is my assignment 2 website</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center; 
      align-items: center;    
      background-color: rgba(198, 137, 241, 0.874);
    }

    .row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 25px;
    }

    .image-container img {
      width: 150px;
      height: 150px;
      object-fit: contain;
    }
  </style>
</head>

<body>

<div class="row">

  <div class="image-container">
    <img id="icon1" src="img/1.png" onmouseover="this.src='img/1.1.png';" onmouseout="this.src='img/1.png';">
  </div>

  <div class="image-container">
    <img id="icon2" src="img/2.png" onmouseover="this.src='img/2.2.png';" onmouseout="this.src='img/2.png';">
  </div>

  <div class="image-container">
    <img id="icon3" src="img/3.png" onmouseover="this.src='img/3.3.png';" onmouseout="this.src='img/3.png';">
  </div>

  <div class="image-container">
    <img id="icon4" src="img/4.png" onmouseover="this.src='img/4.4.png';" onmouseout="this.src='img/4.png';">
  </div>

  <div class="image-container">
    <img id="icon5" src="img/5.png" onmouseover="this.src='img/5.5.png';" onmouseout="this.src='img/5.png';">
  </div>

  <div class="image-container">
    <img id="icon6" src="img/6.png" onmouseover="this.src='img/6.6.png';" onmouseout="this.src='img/6.png';">
  </div>

  <div class="image-container">
    <img id="icon7" src="img/7.png" onmouseover="this.src='img/7.7.png';" onmouseout="this.src='img/7.png';">
  </div>

  <div class="image-container">
    <img id="icon8" src="img/8.png" onmouseover="this.src='img/8.8.png';" onmouseout="this.src='img/8.png';">
  </div>

  <div class="image-container">
    <img id="icon9" src="img/9.png" onmouseover="this.src='img/9.9.png';" onmouseout="this.src='img/9.png';">
  </div>

</div>
<script>
            var sound1 = new buzz.sound("sound/icon 1.mp3");
            var sound2 = new buzz.sound("sound/icon2.mp3");
            var sound3 = new buzz.sound("sound/icon3.mp3");
            var sound4 = new buzz.sound("sound/icon4.mp3");
            var sound5 = new buzz.sound("sound/icon5.mp3");
            var sound6 = new buzz.sound("sound/icon6.mp3");
            var sound7 = new buzz.sound("sound/icon7.mp3");
            var sound8 = new buzz.sound("sound/icon8.mp3");
            var sound9 = new buzz.sound("sound/icon9.mp3");

        window.onload = function() {
                document.getElementById('icon1').addEventListener('mouseover', function () {sound1.play(); });  
                document.getElementById('icon2').addEventListener('mouseover', function () {sound2.play(); });  
                document.getElementById('icon3').addEventListener('mouseover', function () {sound3.play(); });  
                document.getElementById('icon4').addEventListener('mouseover', function () {sound4.play(); });  
                document.getElementById('icon5').addEventListener('mouseover', function () {sound5.play(); });  
                document.getElementById('icon6').addEventListener('mouseover', function () {sound6.play(); });  
                document.getElementById('icon7').addEventListener('mouseover', function () {sound7.play(); });  
                document.getElementById('icon8').addEventListener('mouseover', function () {sound8.play(); });  
                document.getElementById('icon9').addEventListener('mouseover', function () {sound9.play(); });  

                    };  

</script>


</body>
</html>
